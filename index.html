<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ogera- dashboard</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("ogera-theme");
          document.documentElement.setAttribute("data-theme", (t === "dark" || t === "bright") ? t : "bright");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
